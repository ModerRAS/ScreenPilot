name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 运行
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup pnpm
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ./backend

      - name: Create release archive (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          cp backend/target/${{ matrix.target }}/release/screen-pilot-backend release/
          cp -r media release/
          tar -czvf screen-pilot-${{ matrix.target }}-nightly.tar.gz release/

      - name: Create release archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          mkdir -p release
          cp backend/target/${{ matrix.target }}/release/screen-pilot-backend.exe release/
          cp -r media release/
          Compress-Archive -Path release/* -DestinationPath screen-pilot-${{ matrix.target }}-nightly.zip

      - name: Upload release asset
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot (Axum + Vue, single binary)
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.repository.updated_at }}
            - Platform: ${{ matrix.target }}
            - Hardware encoding support with auto-detection
            - Access UI at /web
          draft: false
          prerelease: true
          files: screen-pilot-${{ matrix.target }}-nightly.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: matrix.platform != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot (Axum + Vue, single binary)
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.repository.updated_at }}
            - Platform: ${{ matrix.target }}
            - Hardware encoding support with auto-detection
            - Access UI at /web
          draft: false
          prerelease: true
          files: screen-pilot-${{ matrix.target }}-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
