name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 运行
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust targets
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ./backend

      - name: Create release archive (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          BINARY_PATH=$(find backend/target -name "screen-pilot-backend" -type f 2>/dev/null | head -1)
          echo "Found binary: $BINARY_PATH"
          mkdir -p release
          cp "$BINARY_PATH" release/
          cp -r media release/
          tar -czvf screen-pilot-${{ matrix.target }}-nightly.tar.gz release/

      - name: Create release archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $BINARY_PATH = Get-ChildItem -Path backend/target -Filter "*.exe" -Recurse | Select-Object -ExpandProperty FullName
          Write-Host "Found binary: $BINARY_PATH"
          New-Item -ItemType Directory -Path release -Force
          Copy-Item "$BINARY_PATH" release/
          Copy-Item -Path "media" -Destination "release/" -Recurse -Force
          Compress-Archive -Path "release/*" -DestinationPath "screen-pilot-${{ matrix.target }}-nightly.zip" -Force

      - name: Upload release asset
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot (Axum + Vue, single binary)
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.repository.updated_at }}
            - Platform: ${{ matrix.target }}
            - Hardware encoding support with auto-detection
            - Access UI at /web
          draft: false
          prerelease: true
          files: screen-pilot-${{ matrix.target }}-nightly.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: matrix.platform != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot (Axum + Vue, single binary)
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.repository.updated_at }}
            - Platform: ${{ matrix.target }}
            - Hardware encoding support with auto-detection
            - Access UI at /web
          draft: false
          prerelease: true
          files: screen-pilot-${{ matrix.target }}-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
