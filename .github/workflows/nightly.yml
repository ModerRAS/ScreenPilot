name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: check_changes
        run: |
          # Check if there were any source code commits in the last 24 hours
          CHANGED_FILES=$(git log --since="24 hours ago" --name-only --pretty=format: -- backend/ frontend/ 2>/dev/null | grep -E '\.(rs|ts|tsx|vue|css|json|toml)$' | grep -v node_modules | grep -v target | sort -u | wc -l)
          echo "Source files changed in last 24h: $CHANGED_FILES"
          if [ "$CHANGED_FILES" -eq 0 ]; then
            echo "No source code changes in last 24 hours. Skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Source code changes detected. Proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_changes.outputs.skip_build != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        if: steps.check_changes.outputs.skip_build != 'true'
        run: npm install -g pnpm

      - name: Install Rust
        if: steps.check_changes.outputs.skip_build != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        if: steps.check_changes.outputs.skip_build != 'true'
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        if: steps.check_changes.outputs.skip_build != 'true'
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        if: steps.check_changes.outputs.skip_build != 'true'
        run: cargo build --release
        working-directory: .

      - name: Create release archive
        if: steps.check_changes.outputs.skip_build != 'true'
        run: |
          mkdir -p release
          cp ./target/release/screen-pilot-backend release/
          cp -r media release/
          tar -czvf screen-pilot-x86_64-unknown-linux-gnu-nightly.tar.gz release/

      - name: Upload release asset
        if: steps.check_changes.outputs.skip_build != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot
            - Commit: ${{ github.sha }}
            - Platform: x86_64-unknown-linux-gnu
          draft: false
          prerelease: true
          files: screen-pilot-x86_64-unknown-linux-gnu-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

