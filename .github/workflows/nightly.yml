name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release
        working-directory: .

      - name: Create release archive
        run: |
          mkdir -p release
          cp ./target/release/screen-pilot-backend release/
          cp -r media release/
          tar -czvf screen-pilot-x86_64-unknown-linux-gnu-nightly.tar.gz release/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot
            - Commit: ${{ github.sha }}
            - Platform: x86_64-unknown-linux-gnu
          draft: false
          prerelease: true
          files: screen-pilot-x86_64-unknown-linux-gnu-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create release archive
        run: |
          mkdir -p release
          cp ./target/aarch64-apple-darwin/release/screen-pilot-backend release/
          cp -r media release/
          tar -czvf screen-pilot-aarch64-apple-darwin-nightly.tar.gz release/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot
            - Commit: ${{ github.sha }}
            - Platform: aarch64-apple-darwin
          draft: false
          prerelease: true
          files: screen-pilot-aarch64-apple-darwin-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-intel:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create release archive
        run: |
          mkdir -p release
          cp ./target/x86_64-apple-darwin/release/screen-pilot-backend release/
          cp -r media release/
          tar -czvf screen-pilot-x86_64-apple-darwin-nightly.tar.gz release/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot
            - Commit: ${{ github.sha }}
            - Platform: x86_64-apple-darwin
          draft: false
          prerelease: true
          files: screen-pilot-x86_64-apple-darwin-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./frontend

      - name: Build backend
        run: cargo build --release

      - name: Create release archive
        run: |
          mkdir -p release
          cp ./target/release/screen-pilot-backend.exe release/
          cp -r media release/
          powershell -Command "Compress-Archive -Path release/* -DestinationPath screen-pilot-x86_64-pc-windows-msvc-nightly.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: 'Nightly ${{ github.run_number }}'
          body: |
            Nightly build of ScreenPilot
            - Commit: ${{ github.sha }}
            - Platform: x86_64-pc-windows-msvc
          draft: false
          prerelease: true
          files: screen-pilot-x86_64-pc-windows-msvc-nightly.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
