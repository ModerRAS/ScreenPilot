<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenPilot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🖥 ScreenPilot</h1>
    <div class="header-actions">
      <span id="server-url" class="server-url"></span>
      <button id="refresh-btn" class="btn btn-primary" onclick="refreshDevices()">
        🔍 Discover Devices
      </button>
    </div>
  </header>

  <main>
    <!-- Tab navigation -->
    <nav class="tabs">
      <button class="tab-btn active" onclick="showTab('devices')">Devices</button>
      <button class="tab-btn" onclick="showTab('scenes')">Scenes</button>
    </nav>

    <!-- Devices Tab -->
    <div id="tab-devices" class="tab-content active">
      <div id="devices-container">
        <div class="empty-state">
          <p>No devices found. Click <strong>Discover Devices</strong> to scan the network.</p>
        </div>
      </div>
    </div>

    <!-- Scenes Tab -->
    <div id="tab-scenes" class="tab-content">
      <div class="scenes-header">
        <h2>Scenes</h2>
        <button class="btn btn-primary" onclick="showSceneEditor()">＋ New Scene</button>
      </div>

      <div id="scenes-container">
        <div class="empty-state">
          <p>No scenes defined yet. Create a scene to control multiple screens at once.</p>
        </div>
      </div>

      <!-- Scene Editor (inline) -->
      <div id="scene-editor" class="card hidden">
        <h3 id="scene-editor-title">New Scene</h3>
        <div class="form-group">
          <label for="scene-name-input">Scene Name</label>
          <input id="scene-name-input" type="text" placeholder="e.g. Morning" class="input" />
        </div>
        <div id="scene-assignments"></div>
        <div class="editor-actions">
          <button class="btn btn-primary" onclick="saveScene()">Save Scene</button>
          <button class="btn btn-secondary" onclick="hideSceneEditor()">Cancel</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast notifications -->
  <div id="toast" class="toast hidden"></div>

  <script src="main.js"></script>
</body>
</html>
